        /* Обнуление стилей */
        * {

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            width: 300px;

            background: radial-gradient(circle, rgba(36,161,222,0.15) 0%, rgba(0,0,0,0) 70%);

        .card {

            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 2;
            animation: fadeIn 0.6s ease-out-in;

            background-color: #24a1de;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);

        /* Тот самый Эффект Ховера (и фокуса при тапе на мобильном) */
        .tg-button:hover, .tg-button:active {
            background-color: #2296cf;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(36, 161, 222, 0.5);

        .tg-button svg {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @keyframes fadeIn {
